<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TARTIB — Haftalik reja</title>
<style>
  :root{
    --bg:#12141c;
    --surface:#1b1f2c;
    --surface-2:#222738;
    --border:#2a3040;
    --text:#edeff5;
    --text-dim:#9aa3b5;
    --accent:#e8a33d;
    --accent-dim:#7a5a26;
    --done:#3ebd7e;
    --excused:#6c9bcf;
    --missed:#e0616b;
    --radius:14px;
    --font-display:'Space Grotesk', 'Segoe UI', sans-serif;
    --font-body:'Inter', 'Segoe UI', sans-serif;
    --font-mono:'JetBrains Mono', 'Courier New', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      linear-gradient(180deg, rgba(232,163,61,.05), transparent 200px),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--accent);color:#1b1300;}

  .app{max-width:1100px;margin:0 auto;padding:20px 16px 60px;}

  header{
    display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:14px;
    padding:14px 0 22px;
    border-bottom:1px solid var(--border);
    margin-bottom:22px;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{
    width:34px;height:34px;border-radius:9px;
    background:conic-gradient(var(--accent) 0deg, var(--accent-dim) 260deg, var(--border) 260deg);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:11px;font-weight:700;color:#12141c;
  }
  .brand h1{
    font-family:var(--font-display);font-size:20px;letter-spacing:.06em;
    margin:0;text-transform:uppercase;
  }
  .brand span{display:block;font-size:11px;color:var(--text-dim);letter-spacing:.03em;}

  nav.tabs{display:flex;gap:4px;background:var(--surface);padding:4px;border-radius:11px;border:1px solid var(--border);}
  nav.tabs button{
    border:none;background:transparent;color:var(--text-dim);
    font-family:var(--font-body);font-size:13px;font-weight:600;
    padding:9px 14px;border-radius:8px;cursor:pointer;transition:.15s;
  }
  nav.tabs button.active{background:var(--accent);color:#1b1300;}
  nav.tabs button:not(.active):hover{color:var(--text);background:var(--surface-2);}

  .header-actions{display:flex;align-items:center;gap:10px;}
  .icon-btn{
    border:1px solid var(--border);background:var(--surface);color:var(--text-dim);
    width:38px;height:38px;border-radius:10px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;
  }
  .icon-btn.on{color:var(--accent);border-color:var(--accent-dim);background:rgba(232,163,61,.08);}
  .icon-btn:hover{border-color:var(--accent-dim);}

  .btn-primary{
    background:var(--accent);color:#1b1300;border:none;border-radius:10px;
    padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--font-body);
  }
  .btn-primary:hover{filter:brightness(1.08);}
  .btn-ghost{
    background:transparent;border:1px solid var(--border);color:var(--text-dim);
    border-radius:10px;padding:9px 14px;font-size:13px;cursor:pointer;font-family:var(--font-body);
  }
  .btn-ghost:hover{color:var(--text);border-color:var(--accent-dim);}

  .banner{
    background:rgba(224,97,107,.12);border:1px solid rgba(224,97,107,.4);color:#ffb4ba;
    padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;
  }

  section.view{display:none;}
  section.view.active{display:block;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
  .card + .card{margin-top:16px;}

  /* ---- BUGUN (today) ---- */
  .today-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;flex-wrap:wrap;gap:6px;}
  .today-head h2{font-family:var(--font-display);font-size:22px;margin:0;}
  .today-head .date{font-family:var(--font-mono);color:var(--accent);font-size:13px;}

  .ruler{position:relative;height:54px;border-radius:10px;background:var(--surface-2);margin-bottom:22px;overflow:hidden;border:1px solid var(--border);}
  .ruler .tick{position:absolute;top:0;bottom:0;width:1px;background:var(--border);}
  .ruler .tick-label{position:absolute;bottom:2px;font-size:9px;color:var(--text-dim);font-family:var(--font-mono);transform:translateX(2px);}
  .ruler .block{position:absolute;top:8px;height:20px;border-radius:5px;background:rgba(232,163,61,.35);border:1px solid var(--accent);}
  .ruler .block.done{background:rgba(62,189,126,.35);border-color:var(--done);}
  .ruler .block.excused{background:rgba(108,155,207,.35);border-color:var(--excused);}
  .ruler .now-line{position:absolute;top:0;bottom:0;width:2px;background:#fff;box-shadow:0 0 6px #fff;}

  .task-row{
    display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:10px;
    border:1px solid var(--border);margin-bottom:8px;background:var(--surface-2);
  }
  .task-row .t-time{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);width:98px;flex-shrink:0;}
  .task-row .t-title{flex:1;font-weight:600;font-size:14px;}
  .task-row.is-now{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
  .status-btn{
    width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:transparent;
    cursor:pointer;font-size:15px;color:var(--text-dim);transition:.15s;flex-shrink:0;
  }
  .status-btn.done{background:rgba(62,189,126,.15);border-color:var(--done);color:var(--done);}
  .status-btn.excused{background:rgba(108,155,207,.15);border-color:var(--excused);color:var(--excused);}
  .status-btn.future{opacity:.35;cursor:not-allowed;}
  .del-btn{background:transparent;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:4px 6px;}
  .del-btn:hover{color:var(--missed);}

  .empty{color:var(--text-dim);font-size:13px;padding:20px 4px;text-align:center;}

  /* ---- HAFTA (week grid) ---- */
  .week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:10px;flex-wrap:wrap;}
  .week-nav .range{font-family:var(--font-mono);color:var(--accent);font-size:13px;}
  .week-nav .wid{color:var(--text-dim);font-size:12px;}

  table.grid{width:100%;border-collapse:collapse;font-size:13px;}
  table.grid th{
    font-family:var(--font-mono);font-size:11px;color:var(--text-dim);text-transform:uppercase;
    padding:8px 6px;text-align:center;border-bottom:1px solid var(--border);
  }
  table.grid th:first-child{text-align:left;min-width:160px;}
  table.grid td{padding:6px;text-align:center;border-bottom:1px solid var(--border);}
  table.grid td:first-child{text-align:left;}
  .task-name{font-weight:600;}
  .task-time-sm{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);display:block;}
  .grid .status-btn{width:30px;height:30px;font-size:13px;}
  td.today-col{background:rgba(232,163,61,.06);}

  /* ---- STATISTIKA ---- */
  .split-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;}
  .split-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
  #dayPickSel{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:7px 10px;font-family:var(--font-body);font-size:12px;cursor:pointer;
  }
  #dayPickSel:focus{outline:none;border-color:var(--accent);}
  #trendChart{margin-top:14px;}
  #trendChart svg{display:block;}
  #dayPie svg{flex-shrink:0;}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px;}
  .stat-box{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .stat-box .num{font-family:var(--font-display);font-size:28px;color:var(--accent);}
  .stat-box .lbl{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .bars{display:flex;gap:8px;align-items:flex-end;height:120px;margin-top:10px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar-track{width:100%;height:90px;background:var(--surface-2);border-radius:6px;display:flex;align-items:flex-end;overflow:hidden;border:1px solid var(--border);}
  .bar-fill{width:100%;background:linear-gradient(180deg,var(--accent),var(--done));border-radius:6px 6px 0 0;transition:height .3s;}
  .bar-day{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);}
  .compare{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;}
  .compare .col{flex:1;min-width:150px;}
  .compare h4{margin:0 0 6px;font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;}

  /* ---- XULOSA ---- */
  textarea{
    width:100%;min-height:110px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:13px;padding:12px;resize:vertical;
  }
  textarea:focus{outline:none;border-color:var(--accent);}
  .hist-item{border-bottom:1px solid var(--border);padding:12px 0;}
  .hist-item:last-child{border-bottom:none;}
  .hist-item .wid{font-family:var(--font-mono);color:var(--accent);font-size:12px;}
  .hist-item p{margin:6px 0 0;font-size:13px;color:var(--text-dim);white-space:pre-wrap;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(8,9,13,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:380px;}
  .modal h3{margin:0 0 16px;font-family:var(--font-display);}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px;}
  .field input{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    color:var(--text);padding:9px 10px;font-family:var(--font-body);font-size:13px;
  }
  .field input:focus{outline:none;border-color:var(--accent);}
  .modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}

  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text-dim);margin-top:14px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block;}

  @media(max-width:640px){
    table.grid{font-size:11px;}
    .grid .status-btn{width:24px;height:24px;font-size:11px;}
    table.grid th:first-child{min-width:110px;}
    .task-row .t-time{width:76px;}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="mark">24h</div>
      <div>
        <h1>Tartib</h1>
        <span>kunlik intizom &amp; haftalik nazorat</span>
      </div>
    </div>
    <nav class="tabs">
      <button data-view="today" class="active">Bugun</button>
      <button data-view="week">Hafta</button>
      <button data-view="stats">Statistika</button>
      <button data-view="conclusion">Xulosa</button>
    </nav>
    <div class="header-actions">
      <button class="icon-btn" id="notifToggle" title="Ovozli eslatmalar">&#128266;</button>
      <button class="btn-primary" id="addTaskBtn">+ Ish qo'shish</button>
    </div>
  </header>

  <div class="banner" id="errorBanner"></div>

  <!-- BUGUN -->
  <section class="view active" id="view-today">
    <div class="card">
      <div class="today-head">
        <h2>Bugungi tartib</h2>
        <div class="date" id="todayDate"></div>
      </div>
      <div class="ruler" id="ruler"></div>
      <div id="todayList"></div>
      <div class="legend">
        <span><span class="dot" style="background:var(--done)"></span>Bajarildi</span>
        <span><span class="dot" style="background:var(--excused)"></span>Sababli</span>
        <span><span class="dot" style="background:var(--missed)"></span>Bajarilmagan</span>
      </div>
    </div>
  </section>

  <!-- HAFTA -->
  <section class="view" id="view-week">
    <div class="card">
      <div class="week-nav">
        <button class="btn-ghost" id="weekPrev">&larr; Oldingi</button>
        <div style="text-align:center">
          <div class="range" id="weekRange"></div>
          <div class="wid" id="weekIdLabel"></div>
        </div>
        <button class="btn-ghost" id="weekNext">Keyingi &rarr;</button>
      </div>
      <div style="overflow-x:auto">
        <table class="grid" id="weekTable"></table>
      </div>
    </div>
  </section>

  <!-- STATISTIKA -->
  <section class="view" id="view-stats">
    <div class="card">
      <h2 style="font-family:var(--font-display);margin-top:0">Bajarilgan va bajarilmagan ishlar tendensiyasi</h2>
      <div class="stat-grid" id="statThis"></div>
      <div id="trendChart"></div>
    </div>
    <div class="split-row">
      <div class="card" style="flex:1;min-width:280px">
        <div class="split-head">
          <h2 style="font-family:var(--font-display);margin:0">Bir kunlik ishlar taqsimoti</h2>
          <select id="dayPickSel"></select>
        </div>
        <div id="dayPie"></div>
      </div>
      <div class="card" style="flex:1;min-width:280px">
        <h2 style="font-family:var(--font-display);margin-top:0">Haftalik bajarilgan ishlar</h2>
        <div class="bars" id="barsThis"></div>
      </div>
    </div>
    <div class="card">
      <h2 style="font-family:var(--font-display);margin-top:0">O'tgan hafta bilan taqqoslash</h2>
      <div class="compare" id="compareBox"></div>
    </div>
  </section>

  <!-- XULOSA -->
  <section class="view" id="view-conclusion">
    <div class="card">
      <h2 style="font-family:var(--font-display);margin-top:0">Bu hafta xulosasi <span class="wid" id="conclWeekId"></span></h2>
      <textarea id="conclText" placeholder="Bu hafta qanday o'tdi? Nimalar yaxshi bo'ldi, nimani tuzatish kerak?"></textarea>
      <div style="margin-top:10px;text-align:right">
        <button class="btn-primary" id="saveConclBtn">Saqlash</button>
      </div>
    </div>
    <div class="card">
      <h2 style="font-family:var(--font-display);margin-top:0">Oldingi xulosalar</h2>
      <div id="conclHistory"></div>
    </div>
  </section>

</div>

<!-- add task modal -->
<div class="overlay" id="modalOverlay">
  <div class="modal">
    <h3>Yangi ish qo'shish</h3>
    <div class="field"><label>Nomi</label><input id="fTitle" placeholder="Masalan: Ingliz tili"></div>
    <div class="field"><label>Boshlanish vaqti</label><input id="fStart" type="time"></div>
    <div class="field"><label>Tugash vaqti</label><input id="fEnd" type="time"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="cancelModal">Bekor qilish</button>
      <button class="btn-primary" id="saveTaskBtn">Qo'shish</button>
    </div>
  </div>
</div>

<script>
const API = "https://6a468bbea268c8be2ce813b4.mockapi.io/api/v1";
const DAY_KEYS = ['mon','tue','wed','thu','fri','sat','sun'];
const DAY_LABELS = ['Dush','Sesh','Chor','Pay','Jum','Shan','Yak'];
const DAY_LABELS_FULL = ['Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba','Yakshanba'];

let routines = [];          // {id,title,start,end}
let weeksByRoutine = {};    // routineId -> [ {id,routineId,weekId,statuses,conclusion} ]
let weekOffset = 0;         // for Hafta tab navigation
let notifOn = false;
let firedEvents = new Set();

function showError(msg){
  const b = document.getElementById('errorBanner');
  b.textContent = msg;
  b.style.display = 'block';
}
function clearError(){ document.getElementById('errorBanner').style.display = 'none'; }

// ---------- ISO week helpers ----------
function getISOWeek(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = (d.getUTCDay() + 6) % 7;
  d.setUTCDate(d.getUTCDate() - dayNum + 3);
  const firstThursday = d.getTime();
  d.setUTCMonth(0,1);
  if (d.getUTCDay() !== 4) d.setUTCMonth(0, 1 + ((4 - d.getUTCDay()) + 7) % 7);
  const weekNo = 1 + Math.round((firstThursday - d.getTime()) / (7*86400000));
  return { year: new Date(firstThursday).getUTCFullYear(), week: weekNo };
}
function getWeekInfo(offset){
  const base = new Date();
  base.setDate(base.getDate() + offset*7);
  const { year, week } = getISOWeek(base);
  const weekId = `${year}-W${String(week).padStart(2,'0')}`;
  const dow = (base.getDay()+6)%7;
  const monday = new Date(base); monday.setDate(base.getDate()-dow); monday.setHours(0,0,0,0);
  const days = DAY_KEYS.map((key,i)=>{
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    return { key, label: DAY_LABELS[i], date: d };
  });
  return { weekId, days, monday };
}
function fmtDate(d){ return d.toLocaleDateString('uz-UZ',{day:'2-digit',month:'2-digit'}); }
function todayKeyInWeek(days){
  const t = new Date(); t.setHours(0,0,0,0);
  const found = days.find(d=>d.date.getTime()===t.getTime());
  return found ? found.key : null;
}

// ---------- API ----------
async function apiGet(path){
  const r = await fetch(`${API}${path}`);
  if(!r.ok) throw new Error('API xatosi: '+path);
  return r.json();
}
async function apiPost(path, body){
  const r = await fetch(`${API}${path}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('API xatosi: '+path);
  return r.json();
}
async function apiPut(path, body){
  const r = await fetch(`${API}${path}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('API xatosi: '+path);
  return r.json();
}
async function apiDelete(path){
  const r = await fetch(`${API}${path}`,{method:'DELETE'});
  if(!r.ok) throw new Error('API xatosi: '+path);
}

async function loadAll(){
  clearError();
  try{
    routines = await apiGet('/routine');
    routines.sort((a,b)=> (a.start||'').localeCompare(b.start||''));
    weeksByRoutine = {};
    await Promise.all(routines.map(async r=>{
      try{ weeksByRoutine[r.id] = await apiGet(`/routine/${r.id}/weeks`); }
      catch(e){ weeksByRoutine[r.id] = []; }
    }));
  }catch(e){
    showError("Ma'lumotlarni yuklab bo'lmadi. Internet aloqasi yoki API manzilini tekshiring.");
    routines = []; weeksByRoutine = {};
  }
  renderAll();
}

function getWeekRecord(routineId, weekId){
  const arr = weeksByRoutine[routineId] || [];
  return arr.find(w=>w.weekId===weekId) || null;
}
async function getOrCreateWeekRecord(routineId, weekId){
  let rec = getWeekRecord(routineId, weekId);
  if(rec) return rec;
  rec = await apiPost(`/routine/${routineId}/weeks`, { routineId:String(routineId), weekId, statuses:{}, conclusion:'' });
  weeksByRoutine[routineId] = weeksByRoutine[routineId] || [];
  weeksByRoutine[routineId].push(rec);
  return rec;
}
async function setStatus(routineId, weekId, dayKey, status){
  const rec = await getOrCreateWeekRecord(routineId, weekId);
  const statuses = Object.assign({}, rec.statuses || {});
  if(status) statuses[dayKey] = status; else delete statuses[dayKey];
  const updated = await apiPut(`/routine/${routineId}/weeks/${rec.id}`, { statuses });
  rec.statuses = updated.statuses || statuses;
}
function nextStatus(cur){
  if(cur === 'done') return 'excused';
  if(cur === 'excused') return null;
  return 'done';
}

// ---------- Tabs ----------
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('section.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+btn.dataset.view).classList.add('active');
    renderAll();
  });
});

// ---------- Render ----------
function renderAll(){
  renderToday();
  renderWeek();
  renderStats();
  renderConclusion();
}

function renderToday(){
  const now = new Date();
  document.getElementById('todayDate').textContent = now.toLocaleDateString('uz-UZ',{weekday:'long', day:'2-digit', month:'long'});
  const { weekId, days } = getWeekInfo(0);
  const dayKey = todayKeyInWeek(days);

  // ruler
  const ruler = document.getElementById('ruler');
  ruler.innerHTML = '';
  for(let h=0; h<=24; h+=3){
    const tick = document.createElement('div');
    tick.className='tick'; tick.style.left = (h/24*100)+'%';
    ruler.appendChild(tick);
    const lbl = document.createElement('div');
    lbl.className='tick-label'; lbl.style.left=(h/24*100)+'%'; lbl.textContent=String(h).padStart(2,'0');
    ruler.appendChild(lbl);
  }
  routines.forEach(r=>{
    if(!r.start || !r.end) return;
    const s = timeToMin(r.start), e = timeToMin(r.end);
    if(e<=s) return;
    const rec = getWeekRecord(r.id, weekId);
    const st = rec && rec.statuses ? rec.statuses[dayKey] : null;
    const block = document.createElement('div');
    block.className = 'block' + (st==='done'?' done':st==='excused'?' excused':'');
    block.style.left = (s/1440*100)+'%';
    block.style.width = Math.max((e-s)/1440*100,0.6)+'%';
    block.title = r.title;
    ruler.appendChild(block);
  });
  const nowLine = document.createElement('div');
  nowLine.className='now-line';
  nowLine.style.left = ((now.getHours()*60+now.getMinutes())/1440*100)+'%';
  ruler.appendChild(nowLine);

  // list
  const list = document.getElementById('todayList');
  list.innerHTML='';
  if(routines.length===0){
    list.innerHTML = '<div class="empty">Hali ish qo\'shilmagan. Yuqoridagi "+ Ish qo\'shish" tugmasi bilan boshlang.</div>';
    return;
  }
  const nowMin = now.getHours()*60+now.getMinutes();
  routines.forEach(r=>{
    const rec = getWeekRecord(r.id, weekId);
    const st = rec && rec.statuses ? rec.statuses[dayKey] : null;
    const row = document.createElement('div');
    const s=timeToMin(r.start||'00:00'), e=timeToMin(r.end||'00:00');
    row.className='task-row' + (nowMin>=s && nowMin<e ? ' is-now' : '');
    row.innerHTML = `
      <div class="t-time">${r.start||'--:--'}&ndash;${r.end||'--:--'}</div>
      <div class="t-title">${escapeHtml(r.title||'')}</div>
      <button class="status-btn ${st==='done'?'done':st==='excused'?'excused':''}" data-rid="${r.id}" data-day="${dayKey}" data-week="${weekId}">${st==='done'?'&#10003;':st==='excused'?'&#9711;':''}</button>
      <button class="del-btn" data-del="${r.id}" title="O'chirish">&#10005;</button>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.status-btn').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const cur = b.classList.contains('done')?'done':b.classList.contains('excused')?'excused':null;
      const ns = nextStatus(cur);
      try{
        await setStatus(b.dataset.rid, b.dataset.week, b.dataset.day, ns);
        renderAll();
      }catch(e){ showError("Holatni saqlab bo'lmadi."); }
    });
  });
  list.querySelectorAll('[data-del]').forEach(b=>{
    b.addEventListener('click', async ()=>{
      if(!confirm("Bu ishni o'chirmoqchimisiz?")) return;
      try{ await apiDelete(`/routine/${b.dataset.del}`); await loadAll(); }
      catch(e){ showError("O'chirib bo'lmadi."); }
    });
  });
}

function renderWeek(){
  const { weekId, days } = getWeekInfo(weekOffset);
  document.getElementById('weekRange').textContent = `${fmtDate(days[0].date)} — ${fmtDate(days[6].date)}`;
  document.getElementById('weekIdLabel').textContent = weekId;
  const todayKey = weekOffset===0 ? todayKeyInWeek(getWeekInfo(0).days) : null;

  const table = document.getElementById('weekTable');
  let html = '<tr><th>Ish</th>' + days.map((d,i)=>`<th>${DAY_LABELS[i]}<br>${fmtDate(d.date)}</th>`).join('') + '</tr>';
  if(routines.length===0){
    table.innerHTML = html + `<tr><td colspan="8" class="empty">Hali ish qo'shilmagan.</td></tr>`;
    return;
  }
  const now = new Date(); now.setHours(0,0,0,0);
  routines.forEach(r=>{
    const rec = getWeekRecord(r.id, weekId);
    html += `<tr><td><span class="task-name">${escapeHtml(r.title||'')}</span><span class="task-time-sm">${r.start||''}&ndash;${r.end||''}</span></td>`;
    days.forEach(d=>{
      const st = rec && rec.statuses ? rec.statuses[d.key] : null;
      const isFuture = d.date.getTime() > now.getTime();
      const cls = st==='done'?'done':st==='excused'?'excused':'';
      const disabled = isFuture ? 'future' : '';
      const isToday = d.key===todayKey ? 'today-col':'';
      html += `<td class="${isToday}"><button class="status-btn ${cls} ${disabled}" ${isFuture?'disabled':''} data-rid="${r.id}" data-day="${d.key}" data-week="${weekId}">${st==='done'?'&#10003;':st==='excused'?'&#9711;':''}</button></td>`;
    });
    html += '</tr>';
  });
  table.innerHTML = html;
  table.querySelectorAll('.status-btn:not(.future)').forEach(b=>{
    b.addEventListener('click', async ()=>{
      const cur = b.classList.contains('done')?'done':b.classList.contains('excused')?'excused':null;
      const ns = nextStatus(cur);
      try{ await setStatus(b.dataset.rid, b.dataset.week, b.dataset.day, ns); renderAll(); }
      catch(e){ showError("Holatni saqlab bo'lmadi."); }
    });
  });
}

document.getElementById('weekPrev').addEventListener('click',()=>{weekOffset--; renderAll();});
document.getElementById('weekNext').addEventListener('click',()=>{weekOffset++; renderAll();});

function weekCounts(weekId, days){
  const now = new Date(); now.setHours(0,0,0,0);
  let done=0, excused=0, missed=0, total=0;
  const perDay = {};
  days.forEach(d=>perDay[d.key] = {done:0, total:0});
  routines.forEach(r=>{
    const rec = getWeekRecord(r.id, weekId);
    days.forEach(d=>{
      if(d.date.getTime() > now.getTime()) return; // don't count future days
      total++;
      perDay[d.key].total++;
      const st = rec && rec.statuses ? rec.statuses[d.key] : null;
      if(st==='done'){ done++; perDay[d.key].done++; }
      else if(st==='excused') excused++;
      else missed++;
    });
  });
  return { done, excused, missed, total, perDay };
}

let dayPickInitialized = false;

function dayCounts(weekId, dayKey, dayDate){
  const now = new Date(); now.setHours(0,0,0,0);
  const isFuture = dayDate.getTime() > now.getTime();
  let done=0, excused=0, missed=0;
  routines.forEach(r=>{
    const rec = getWeekRecord(r.id, weekId);
    const st = rec && rec.statuses ? rec.statuses[dayKey] : null;
    if(st==='done') done++;
    else if(st==='excused') excused++;
    else if(!isFuture) missed++;
  });
  return { done, excused, missed, total: routines.length, isFuture };
}

function renderDonut(counts){
  const total = counts.done + counts.excused + counts.missed;
  const r = 60, C = 2*Math.PI*r;
  const pct = v => total ? Math.round(v/total*100) : 0;
  let offset = 0, circles = '';
  [
    {v:counts.done, color:'var(--done)'},
    {v:counts.excused, color:'var(--excused)'},
    {v:counts.missed, color:'var(--missed)'},
  ].forEach(seg=>{
    if(seg.v<=0) return;
    const len = total ? seg.v/total*C : 0;
    circles += `<circle cx="90" cy="90" r="${r}" fill="none" stroke="${seg.color}" stroke-width="26" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 90 90)"/>`;
    offset += len;
  });
  return `
    <div style="display:flex;align-items:center;gap:22px;flex-wrap:wrap">
      <svg width="180" height="180" viewBox="0 0 180 180">
        ${total ? circles : `<circle cx="90" cy="90" r="${r}" fill="none" stroke="var(--border)" stroke-width="26"/>`}
        <text x="90" y="96" text-anchor="middle" font-family="var(--font-display)" font-size="22" fill="var(--text)">${pct(counts.done)}%</text>
      </svg>
      <div class="legend" style="flex-direction:column;gap:10px;align-items:flex-start;margin-top:0">
        <span><span class="dot" style="background:var(--done)"></span>Bajarildi ${pct(counts.done)}% (${counts.done})</span>
        <span><span class="dot" style="background:var(--excused)"></span>Sababli ${pct(counts.excused)}% (${counts.excused})</span>
        <span><span class="dot" style="background:var(--missed)"></span>Bajarilmagan ${pct(counts.missed)}% (${counts.missed})</span>
      </div>
    </div>
  `;
}

function renderDayPie(){
  const cur = getWeekInfo(0);
  const sel = document.getElementById('dayPickSel');
  if(!dayPickInitialized){
    sel.innerHTML = cur.days.map(d=>`<option value="${d.key}">${DAY_LABELS_FULL[DAY_KEYS.indexOf(d.key)]}</option>`).join('');
    const todayKey = todayKeyInWeek(cur.days);
    sel.value = todayKey || cur.days[0].key;
    sel.addEventListener('change', renderDayPie);
    dayPickInitialized = true;
  }
  const dayKey = sel.value;
  const day = cur.days.find(d=>d.key===dayKey);
  const counts = dayCounts(cur.weekId, dayKey, day.date);
  document.getElementById('dayPie').innerHTML = counts.total===0
    ? '<div class="empty">Hali ish qo\'shilmagan.</div>'
    : renderDonut(counts);
}

function renderTrend(){
  const points = [];
  for(let o=-5; o<=0; o++) points.push(getWeekInfo(o));
  const data = points.map(w=>{
    const c = weekCounts(w.weekId, w.days);
    const label = w.weekId.includes('-W') ? 'W'+w.weekId.split('-W')[1] : w.weekId;
    return { label, done:c.done, missed:c.missed };
  });
  const maxVal = Math.max(1, ...data.map(d=>Math.max(d.done, d.missed)));
  const W=620, H=210, padL=30, padR=10, padT=12, padB=22;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const stepX = data.length>1 ? plotW/(data.length-1) : 0;
  const xAt = i => padL + stepX*i;
  const yAt = v => padT + plotH - (v/maxVal*plotH);

  let grid='';
  for(let g=0; g<=4; g++){
    const val = Math.round(maxVal/4*g);
    const y = yAt(val);
    grid += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--border)" stroke-dasharray="3,3"/>`;
    grid += `<text x="${padL-6}" y="${y+3}" font-size="9" fill="var(--text-dim)" text-anchor="end" font-family="var(--font-mono)">${val}</text>`;
  }
  let xlabels='';
  data.forEach((d,i)=>{ xlabels += `<text x="${xAt(i)}" y="${H-6}" font-size="9" fill="var(--text-dim)" text-anchor="middle" font-family="var(--font-mono)">${d.label}</text>`; });
  const donePts = data.map((d,i)=>`${xAt(i)},${yAt(d.done)}`).join(' ');
  const missPts = data.map((d,i)=>`${xAt(i)},${yAt(d.missed)}`).join(' ');
  const doneDots = data.map((d,i)=>`<circle cx="${xAt(i)}" cy="${yAt(d.done)}" r="3.5" fill="var(--done)"/>`).join('');
  const missDots = data.map((d,i)=>`<circle cx="${xAt(i)}" cy="${yAt(d.missed)}" r="3.5" fill="var(--missed)"/>`).join('');

  document.getElementById('trendChart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
      ${grid}
      <polyline points="${donePts}" fill="none" stroke="var(--done)" stroke-width="2"/>
      <polyline points="${missPts}" fill="none" stroke="var(--missed)" stroke-width="2"/>
      ${doneDots}${missDots}
      ${xlabels}
    </svg>
    <div class="legend" style="justify-content:center;margin-top:4px">
      <span><span class="dot" style="background:var(--done)"></span>Bajarilgan</span>
      <span><span class="dot" style="background:var(--missed)"></span>Bajarilmagan</span>
    </div>
  `;
}

function renderStats(){
  const cur = getWeekInfo(0);
  const prev = getWeekInfo(-1);
  const curC = weekCounts(cur.weekId, cur.days);
  const prevC = weekCounts(prev.weekId, prev.days);

  const pct = (n,t)=> t? Math.round(n/t*100) : 0;
  const statThis = document.getElementById('statThis');
  statThis.innerHTML = `
    <div class="stat-box"><div class="num">${pct(curC.done,curC.total)}%</div><div class="lbl">Bajarilgan</div></div>
    <div class="stat-box"><div class="num">${curC.excused}</div><div class="lbl">Sababli</div></div>
    <div class="stat-box"><div class="num">${curC.missed}</div><div class="lbl">Bajarilmagan</div></div>
    <div class="stat-box"><div class="num">${curC.total}</div><div class="lbl">Jami vazifa</div></div>
  `;

  renderTrend();
  renderDayPie();

  const bars = document.getElementById('barsThis');
  bars.innerHTML='';
  cur.days.forEach(d=>{
    const pd = curC.perDay[d.key];
    const h = pd.total ? Math.round(pd.done/pd.total*90) : 0;
    bars.innerHTML += `<div class="bar-col"><div class="bar-track"><div class="bar-fill" style="height:${h}px"></div></div><div class="bar-day">${d.label}</div></div>`;
  });

  const compare = document.getElementById('compareBox');
  const diff = pct(curC.done,curC.total) - pct(prevC.done,prevC.total);
  const diffTxt = diff>0? `+${diff}%` : `${diff}%`;
  compare.innerHTML = `
    <div class="col"><h4>O'tgan hafta (${prev.weekId})</h4><div class="stat-box"><div class="num">${pct(prevC.done,prevC.total)}%</div><div class="lbl">Bajarilgan</div></div></div>
    <div class="col"><h4>Shu hafta (${cur.weekId})</h4><div class="stat-box"><div class="num">${pct(curC.done,curC.total)}%</div><div class="lbl">Bajarilgan</div></div></div>
    <div class="col"><h4>O'zgarish</h4><div class="stat-box"><div class="num" style="color:${diff>=0?'var(--done)':'var(--missed)'}">${diffTxt}</div><div class="lbl">Oldingi haftaga nisbatan</div></div></div>
  `;
}

function renderConclusion(){
  const { weekId } = getWeekInfo(weekOffset);
  document.getElementById('conclWeekId').textContent = `(${weekId})`;
  let existing = '';
  for(const r of routines){
    const rec = getWeekRecord(r.id, weekId);
    if(rec && rec.conclusion){ existing = rec.conclusion; break; }
  }
  document.getElementById('conclText').value = existing;

  // history: dedupe by weekId across all routines
  const map = new Map();
  Object.values(weeksByRoutine).forEach(arr=>{
    arr.forEach(rec=>{
      if(rec.conclusion && rec.conclusion.trim() && !map.has(rec.weekId)){
        map.set(rec.weekId, rec.conclusion);
      }
    });
  });
  const hist = document.getElementById('conclHistory');
  const entries = Array.from(map.entries()).sort((a,b)=>b[0].localeCompare(a[0]));
  hist.innerHTML = entries.length
    ? entries.map(([wid,txt])=>`<div class="hist-item"><div class="wid">${wid}</div><p>${escapeHtml(txt)}</p></div>`).join('')
    : '<div class="empty">Hali xulosa yozilmagan.</div>';
}

// ---------- Notifications (voice) ----------
let audioCtx = null;
function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
// Plays a short two-tone chime, entirely generated in-browser (no mp3/asset file needed).
function playChime(){
  try{
    const ctx = getAudioCtx();
    const now = ctx.currentTime;
    [880, 1320].forEach((freq, i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const start = now + i*0.16;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.25, start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start+0.32);
      osc.connect(gain).connect(ctx.destination);
      osc.start(start);
      osc.stop(start+0.34);
    });
  }catch(e){}
}
document.getElementById('notifToggle').addEventListener('click', ()=>{
  notifOn = !notifOn;
  document.getElementById('notifToggle').classList.toggle('on', notifOn);
  if(notifOn){ getAudioCtx(); playChime(); speak("Ovozli eslatmalar yoqildi"); }
});
function speak(text){
  playChime();
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'uz-UZ';
    u.rate = 0.95;
    speechSynthesis.speak(u);
  }catch(e){}
}
function timeToMin(t){
  if(!t) return 0;
  const [h,m] = t.split(':').map(Number);
  return h*60+(m||0);
}
function checkNotifications(){
  if(!notifOn) return;
  const now = new Date();
  const nowMin = now.getHours()*60+now.getMinutes();
  const nowSec = now.getSeconds();
  const dateStr = now.toDateString();
  routines.forEach(r=>{
    if(!r.start || !r.end) return;
    const s = timeToMin(r.start), e = timeToMin(r.end);
    const checks = [
      { key:'warnStart', atMin: s, offsetSec: -90, text: `${r.title} ${1} daqiqa 30 soniyadan keyin boshlanadi` },
      { key:'start', atMin: s, offsetSec: 0, text: `${r.title} boshlandi` },
      { key:'warnEnd', atMin: e, offsetSec: -90, text: `${r.title} 1 daqiqa 30 soniyadan keyin tugaydi` },
      { key:'end', atMin: e, offsetSec: 0, text: `${r.title} tugadi` },
    ];
    checks.forEach(c=>{
      const targetTotalSec = c.atMin*60 + c.offsetSec;
      const nowTotalSec = nowMin*60 + nowSec;
      const fireKey = `${r.id}-${c.key}-${dateStr}`;
      if(Math.abs(nowTotalSec - targetTotalSec) <= 10 && !firedEvents.has(fireKey)){
        firedEvents.add(fireKey);
        speak(c.text);
      }
    });
  });
}
setInterval(checkNotifications, 8000);
setInterval(()=>{ if(document.getElementById('view-today').classList.contains('active')) renderToday(); }, 30000);

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
